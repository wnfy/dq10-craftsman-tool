<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">アストルティア職人手帖</title>
  <desc id="desc">三つの目標値を記した職人レシピカード</desc>

  <!-- Cobalt offset shadow -->
  <rect x="98" y="91" width="330" height="330" rx="76" fill="#2856E8"/>

  <!-- Warm paper card -->
  <rect x="76" y="69" width="330" height="330" rx="76" fill="#FFFDF6" stroke="#15213D" stroke-width="18"/>

  <!-- Printed ledger header -->
  <rect x="113" y="111" width="190" height="34" rx="17" fill="#2856E8"/>
  <circle cx="334" cy="128" r="17" fill="#FFD84D" stroke="#15213D" stroke-width="8"/>

  <!-- Three target-value slips -->
  <g stroke="#15213D" stroke-width="10" stroke-linejoin="round">
    <rect x="112" y="181" width="236" height="47" rx="23.5" fill="#FF6655"/>
    <rect x="112" y="244" width="236" height="47" rx="23.5" fill="#FFD84D"/>
    <rect x="112" y="307" width="236" height="47" rx="23.5" fill="#51D5B1"/>
  </g>

  <!-- Precision marks -->
  <g fill="#15213D">
    <circle cx="143" cy="204.5" r="8"/>
    <circle cx="143" cy="267.5" r="8"/>
    <circle cx="143" cy="330.5" r="8"/>
    <rect x="164" y="196" width="139" height="17" rx="8.5"/>
    <rect x="164" y="259" width="116" height="17" rx="8.5"/>
    <rect x="164" y="322" width="151" height="17" rx="8.5"/>
  </g>

  <!-- Four-point craft spark -->
  <path d="M374 50C379 78 392 91 420 96C392 101 379 114 374 142C369 114 356 101 328 96C356 91 369 78 374 50Z" fill="#FF6655" stroke="#15213D" stroke-width="8" stroke-linejoin="round"/>
</svg>
